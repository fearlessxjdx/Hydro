name: Publish Docker image

on:
  push:
    branches:
      - master
  release:
    types: [published]

jobs:
  push_to_registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login in aliyun registry
        run: docker login --username=${{ secrets.DOCKER_USERNAME }} --password=${{ secrets.DOCKER_PASSWORD }} registry.cn-hangzhou.aliyuncs.com

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            echo "TAG=latest" >> $GITHUB_ENV
          fi

      - name: Build the backend
        run: docker build ./install/docker/backend/ -f ./install/docker/backend/Dockerfile --tag registry.cn-hangzhou.aliyuncs.com/hydro/backend:${TAG}

      - name: Build the judge
        run: docker build ./install/docker/judge/ -f ./install/docker/judge/Dockerfile --tag registry.cn-hangzhou.aliyuncs.com/hydro/judge:${TAG}

      - name: Push to the aliyun registry
        run: |
          docker push registry.cn-hangzhou.aliyuncs.com/hydro/backend:${TAG}
          docker push registry.cn-hangzhou.aliyuncs.com/hydro/judge:${TAG}
